<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Grid</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 20px;
    width: 90vw;
    height: 90vh;
  }

  .card {
    background: #222;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: #fff;
    padding: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  .thumbnail {
    flex: 1;
    background: #555;
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .content {
    text-align: center;
  }

  .content a {
    color: #00f;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="thumbnail">
        <img src="204a5955-0573-45d2-b0a6-fbce245b603a.png" alt="Evaluation Thumbnail">
      </div>
      <div class="content">
        <p>Evaluation & Annotation</p>
        <a href="#">View</a>
      </div>
    </div>
    <div class="card">
      <div class="thumbnail">
        <img src="placeholder2.png" alt="Resume Thumbnail">
      </div>
      <div class="content">
        <p>Resume</p>
        <a href="https://drive.google.com/file/d/1kvNxCSGXsWik5_sMzrUKhOgxW9Nhqt4i/view" target="_blank">Open</a>
      </div>
    </div>
    <div class="card">
      <div class="thumbnail">
        <img src="placeholder3.png" alt="Certificate Thumbnail">
      </div>
      <div class="content">
        <p>Certificate</p>
        <a href="#">Open</a>
      </div>
    </div>
    <div class="card">
      <div class="thumbnail">
        <img src="placeholder4.png" alt="Project Thumbnail">
      </div>
      <div class="content">
        <p>Project</p>
        <a href="#">Open</a>
      </div>
    </div>
  </div>
</body>
</html>
