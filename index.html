<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - Hillary Kusumo</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    color: #ddd;
    background-color: #0d0d0d;
  }

  header {
    padding: 30px 20px;
    text-align: center;
    border-bottom: 1px solid #2a2a2a;
  }

  header h1 {
    margin: 0;
    font-size: 2.2em;
  }

  header p {
    color: #aaa;
    margin-top: 10px;
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
  }

  .section-title {
    font-size: 1.6em;
    margin-bottom: 20px;
    border-left: 4px solid #444;
    padding-left: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 20px;
  }

  .card {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #2a2a2a;
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  }

  .thumbnail {
    height: 150px;
    background: #2a2a2a;
    border-radius: 8px;
    margin-bottom: 15px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#aaa;
  }

  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .btn {
    flex: 1;
    padding: 10px;
    background: #333;
    color: #fff;
    text-align: center;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    text-decoration: none;
  }

  .btn:hover {
    background: #555;
  }

  .modal {
    display: none;
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
  }

  .modal.show {
    display:flex;
  }

  .modal-content {
    width: 80%;
    height: 80%;
    background:#111;
    border-radius:10px;
    overflow:hidden;
    position: relative;
  }

  .close-btn {
    position:absolute;
    top:10px;
    right:10px;
    background:#333;
    color:#fff;
    border:none;
    padding:8px 12px;
    cursor:pointer;
  }

  iframe {
    width:100%;
    height:100%;
    border:none;
  }

  footer {
    text-align: center;
    padding: 20px;
    color: #777;
    border-top: 1px solid #2a2a2a;
    margin-top: 30px;
  }
</style>
</head>

<body>

<header>
  <h1>Hillary Kusumo</h1>
  <p>Data Annotation and Video Evaluation Portfolio</p>
</header>

<div class="container">

  <div class="section-title">Projects</div>

  <div class="grid">

    <div class="card">
      <div class="thumbnail">Evaluation</div>
      <h3>Video Evaluation</h3>
    </div>

    <div class="card">
      <div class="thumbnail">Image</div>
      <h3>Image Bursts</h3>
    </div>

    <div class="card">
      <div class="thumbnail">Video</div>
      <h3>Video Bursts</h3>
    </div>

    <div class="card">
      <div class="thumbnail">Modules</div>
      <h3>Modules</h3>
    </div>

  </div>

  <div class="section-title" style="margin-top:40px;">Documents</div>

  <div class="grid">

    <div class="card">
      <div class="thumbnail">Resume</div>
      <h3>Resume</h3>
      <div class="btn-group">
        <button class="btn" onclick="openPreview('resumeFrame','https://drive.google.com/file/d/1kvNxCSGXsWik5_sMzrUKhOgxW9Nhqt4i/preview')">View</button>
        <a href="https://drive.google.com/uc?export=download&id=1kvNxCSGXsWik5_sMzrUKhOgxW9Nhqt4i" class="btn">Download</a>
      </div>
    </div>

    <div class="card">
      <div class="thumbnail">Certificate</div>
      <h3>Certificate</h3>
      <div class="btn-group">
        <button class="btn" onclick="openPreview('certFrame','YOUR_CERT_LINK_HERE')">View</button>
        <a href="#" class="btn">Download</a>
      </div>
    </div>

  </div>

</div>

<footer>
  © 2026 Hillary Kusumo
</footer>

<div class="modal" id="resumeFrame">
  <div class="modal-content">
    <button class="close-btn" onclick="closePreview('resumeFrame')">Close</button>
    <iframe id="resumeViewer"></iframe>
  </div>
</div>

<div class="modal" id="certFrame">
  <div class="modal-content">
    <button class="close-btn" onclick="closePreview('certFrame')">Close</button>
    <iframe id="certViewer"></iframe>
  </div>
</div>

<script>
function openPreview(modalId, link){
  document.getElementById(modalId).classList.add('show');

  if(modalId === 'resumeFrame'){
    document.getElementById('resumeViewer').src = link;
  }

  if(modalId === 'certFrame'){
    document.getElementById('certViewer').src = link;
  }
}

function closePreview(modalId){
  document.getElementById(modalId).classList.remove('show');

  if(modalId === 'resumeFrame'){
    document.getElementById('resumeViewer').src = "";
  }

  if(modalId === 'certFrame'){
    document.getElementById('certViewer').src = "";
  }
}
</script>

</body>
</html>
