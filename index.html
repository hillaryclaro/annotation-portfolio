<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - Hillary Kusumo</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0b0b0b;
  color: #e0e0e0;
}

header {
  text-align: center;
  padding: 30px;
  border-bottom: 1px solid #222;
  background: #111;
}

header h1 {
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 25px;
}

.card {
  background: #161616;
  border-radius: 12px;
  padding: 20px;
  border: 1px solid #222;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

.thumbnail {
  height: 180px;
  border-radius: 10px;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #888;
  margin-bottom: 15px;
  overflow: hidden;
}

.thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

h3 {
  margin: 10px 0;
}

.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.button {
  flex: 1;
  padding: 12px;
  border-radius: 6px;
  border: none;
  background: #2f2f2f;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  text-align: center;
  transition: 0.2s;
}

.button:hover {
  background: #444;
}

.button.secondary {
  background: #1f1f1f;
  border: 1px solid #333;
}

.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
}

.modal.show {
  display: flex;
}

.modal-content {
  width: 80%;
  height: 80%;
  background: #111;
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}

.close-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #222;
  color: #fff;
  border: none;
  padding: 8px 12px;
  cursor: pointer;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<header>
  <h1>Hillary Kusumo</h1>
</header>

<div class="container">
  <div class="grid">

    <!-- Resume -->
    <div class="card">
      <div class="thumbnail">
        <img src="Resume Thumbnail.png">
      </div>
      <h3>Resume</h3>
      <div class="btn-group">
        <button class="button" onclick="openPreview('resumeModal','https://drive.google.com/file/d/1kvNxCSGXsWik5_sMzrUKhOgxW9Nhqt4i/preview')">
          View
        </button>
        <button class="button secondary" onclick="downloadFile('https://drive.google.com/uc?export=download&id=1kvNxCSGXsWik5_sMzrUKhOgxW9Nhqt4i')">
          Download
        </button>
      </div>
    </div>

    <!-- Certificate -->
    <div class="card">
      <div class="thumbnail">
        <img src="Certificate Thumbnail.png">
      </div>
      <h3>Certificate</h3>
      <div class="btn-group">
        <button class="button" onclick="openPreview('certModal','YOUR_CERT_LINK_HERE')">
          View
        </button>
        <button class="button secondary" onclick="downloadFile('YOUR_CERT_DOWNLOAD_LINK')">
          Download
        </button>
      </div>
    </div>

    <!-- Annotation -->
    <div class="card">
      <div class="thumbnail">
        Annotation Project
      </div>
      <h3>Annotation Project</h3>
    </div>

    <!-- Evaluation -->
    <div class="card">
      <div class="thumbnail">
        Video & Image Evaluation
      </div>
      <h3>Video & Image Evaluation</h3>
    </div>

  </div>
</div>

<!-- Resume Modal -->
<div class="modal" id="resumeModal">
  <div class="modal-content">
    <button class="close-btn" onclick="closePreview('resumeModal')">Close</button>
    <iframe id="resumeFrame"></iframe>
  </div>
</div>

<!-- Certificate Modal -->
<div class="modal" id="certModal">
  <div class="modal-content">
    <button class="close-btn" onclick="closePreview('certModal')">Close</button>
    <iframe id="certFrame"></iframe>
  </div>
</div>

<script>
function openPreview(modalId, link){
  document.getElementById(modalId).classList.add('show');

  if(modalId === 'resumeModal'){
    document.getElementById('resumeFrame').src = link;
  }

  if(modalId === 'certModal'){
    document.getElementById('certFrame').src = link;
  }
}

function closePreview(modalId){
  document.getElementById(modalId).classList.remove('show');

  if(modalId === 'resumeModal'){
    document.getElementById('resumeFrame').src = "";
  }

  if(modalId === 'certModal'){
    document.getElementById('certFrame').src = "";
  }
}

function downloadFile(link){
  window.open(link, '_blank');
}
</script>

</body>
</html>
